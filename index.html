<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>رصد دراسات الشرق الأوسط وأفريقيا</title>
  <style>
    body{font-family:Tahoma,Arial,sans-serif;margin:0;background:#0b1220;color:#e5e7eb}
    header{padding:20px;background:#111827;position:sticky;top:0}
    .wrap{max-width:1200px;margin:auto;padding:16px}
    input,select{padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e5e7eb}
    .toolbar{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px}
    .stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
    .stat{background:#111827;padding:10px 14px;border-radius:10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-top:18px}
    .card{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:14px}
    .meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
    .pill{font-size:12px;background:#1f2937;padding:4px 8px;border-radius:999px}
    .title{font-size:18px;line-height:1.4;margin:8px 0}
    .title a{color:#f8fafc;text-decoration:none}
    .desc{font-size:13px;color:#94a3b8;line-height:1.6}
    .actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
    .btn{padding:8px 12px;border-radius:8px;text-decoration:none;color:white;background:#2563eb}
    .btn.pdf{background:#dc2626}
    .muted{color:#94a3b8;font-size:12px}
    @media(max-width:800px){.toolbar{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>رصد دراسات الشرق الأوسط وأفريقيا</h1>
      <div class="toolbar">
        <input id="q" placeholder="ابحث بالعنوان أو المصدر..." />
        <select id="region">
          <option value="all">كل المناطق</option>
          <option value="mena">الشرق الأوسط/العالم العربي</option>
          <option value="africa">أفريقيا</option>
          <option value="global">عالمي</option>
        </select>
        <select id="base">
          <option value="all">كل المقرات</option>
          <option value="in-region">مقره في المنطقة</option>
          <option value="in-africa">مقره في أفريقيا</option>
          <option value="outside">مقره خارج المنطقة</option>
        </select>
        <select id="lang">
          <option value="all">كل اللغات</option>
          <option value="ar">العربية</option>
          <option value="en">English</option>
          <option value="fr">Français</option>
        </select>
      </div>
      <div class="stats">
        <div class="stat">الإجمالي: <b id="total">0</b></div>
        <div class="stat">MENA: <b id="menaCount">0</b></div>
        <div class="stat">Africa: <b id="africaCount">0</b></div>
        <div class="stat">PDF مباشر: <b id="pdfCount">0</b></div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="generated" class="muted"></div>
    <div id="grid" class="grid"></div>
  </main>

  <script>
    let REPORTS = [];

    function fmtDate(date) {
      try { return new Date(date).toLocaleDateString('ar-EG'); }
      catch { return date; }
    }

    function render(items) {
      document.getElementById('total').textContent = items.length;
      document.getElementById('menaCount').textContent = items.filter(x => x.region === 'mena').length;
      document.getElementById('africaCount').textContent = items.filter(x => x.region === 'africa').length;
      document.getElementById('pdfCount').textContent = items.filter(x => x.hasPdf).length;

      const grid = document.getElementById('grid');
      if (!items.length) {
        grid.innerHTML = '<div class="muted">لا توجد نتائج مطابقة.</div>';
        return;
      }

      grid.innerHTML = items.map(r => `
        <div class="card">
          <div class="meta">
            <span class="pill">${r.sourceAr || r.source}</span>
            <span class="pill">${r.region}</span>
            <span class="pill">${r.base}</span>
            <span class="pill">${r.lang}</span>
            <span class="pill">${r.freq || 'periodic'}</span>
          </div>
          <div class="title"><a href="${r.pageUrl || r.url}" target="_blank" rel="noopener">${r.title}</a></div>
          <div class="desc">${r.description || ''}</div>
          <div class="meta" style="margin-top:10px">
            ${(r.topics || []).slice(0,4).map(t => `<span class="pill">${t}</span>`).join('')}
          </div>
          <div class="actions">
            <span class="muted">${fmtDate(r.date)}</span>
            <a class="btn ${r.hasPdf ? 'pdf' : ''}" href="${r.url}" target="_blank" rel="noopener">
              ${r.hasPdf ? 'تحميل PDF' : 'فتح التقرير'}
            </a>
          </div>
        </div>
      `).join('');
    }

    function applyFilters() {
      const q = document.getElementById('q').value.toLowerCase();
      const region = document.getElementById('region').value;
      const base = document.getElementById('base').value;
      const lang = document.getElementById('lang').value;

      const filtered = REPORTS.filter(r => {
        if (region !== 'all' && r.region !== region) return false;
        if (base !== 'all' && r.base !== base) return false;
        if (lang !== 'all' && r.lang !== lang) return false;
        if (q) {
          const hay = `${r.title} ${r.description} ${r.source} ${r.sourceAr}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      render(filtered);
    }

    ['q','region','base','lang'].forEach(id => {
      document.getElementById(id).addEventListener('input', applyFilters);
      document.getElementById(id).addEventListener('change', applyFilters);
    });

    fetch('data/reports.json')
      .then(r => r.json())
      .then(data => {
        REPORTS = data.reports || [];
        document.getElementById('generated').textContent =
          `آخر تحديث للبيانات: ${new Date(data.generatedAt).toLocaleString('ar-EG')}`;
        render(REPORTS);
      })
      .catch(() => {
        document.getElementById('grid').innerHTML =
          '<div class="muted">تعذر تحميل data/reports.json. شغّل الجامع أولاً.</div>';
      });
  </script>
</body>
</html>
